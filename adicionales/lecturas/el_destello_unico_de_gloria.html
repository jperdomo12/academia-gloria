<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectura Interactiva - Academia Gloria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css">
    <style>
        .page-transition { transition: opacity 0.5s ease-in-out; }
        .bg-pattern { background-color: #f8fafc; background-image: radial-gradient(#ddd6fe 0.5px, transparent 0.5px); background-size: 10px 10px; }
    </style>
</head>
<body class="bg-pattern min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-4xl flex justify-between items-center mb-6">
        <a href="index.html" class="text-violet-600 flex items-center gap-2 font-semibold hover:underline">
            <i class="lucide-arrow-left"></i> Volver a Lecturas
        </a>
        <h1 class="text-2xl font-bold text-violet-800">🌟 El Destello Único de Gloria</h1>
    </div>

    <div id="viewer" class="relative w-full max-w-4xl bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-violet-200">
        
        <div id="loader" class="absolute inset-0 flex flex-col items-center justify-center bg-white z-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-violet-700"></div>
            <p class="mt-4 text-violet-600 font-medium">Cargando magia...</p>
        </div>

        <div class="aspect-[4/5] sm:aspect-video flex items-center justify-center overflow-hidden bg-slate-50">
            <img id="book-page" src="" alt="Página" class="page-transition opacity-0 max-h-full w-auto shadow-sm">
        </div>

        <div class="bg-violet-700 p-4 flex justify-between items-center text-white">
            <button onclick="changePage(-1)" id="prevBtn" class="bg-violet-800 hover:bg-violet-900 px-4 py-2 rounded-xl disabled:opacity-30 transition-all flex items-center gap-2">
                <i class="lucide-chevron-left"></i> Anterior
            </button>
            
            <div class="text-center">
                <p class="text-xs uppercase tracking-widest opacity-80">Academia de Gloria</p>
                <p class="font-bold text-lg"><span id="pageNum">1</span> / <span id="totalNum"></span></p>
            </div>

            <button onclick="changePage(1)" id="nextBtn" class="bg-violet-800 hover:bg-violet-900 px-4 py-2 rounded-xl disabled:opacity-30 transition-all flex items-center gap-2">
                Siguiente <i class="lucide-chevron-right"></i>
            </button>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        // Extrae las imágenes de tu PDF (usa ilovepdf.com para convertir PDF a JPG)
        // Luego sube las fotos a Drive y pon los IDs aquí.
        const pageIds = [
            "11MLv_tLknDbn8S8n0Yh_U7w7AQ3yk54b", // Portada (Este es tu ID actual)
            "OTRO_ID_AQUI", // Página 1
            "OTRO_ID_AQUI"  // Página 2...
        ];

        let currentPage = 0;
        const img = document.getElementById('book-page');
        const loader = document.getElementById('loader');

        function loadPage() {
            loader.style.display = 'flex';
            img.classList.add('opacity-0');
            
            // Usamos el visor directo que no falla en iPad
            img.src = `https://drive.google.com/uc?export=view&id=${pageIds[currentPage]}`;
            
            img.onload = () => {
                loader.style.display = 'none';
                img.classList.remove('opacity-0');
                img.classList.add('opacity-100');
                document.getElementById('pageNum').innerText = currentPage + 1;
                updateButtons();
            };
        }

        function changePage(dir) {
            if ((dir === 1 && currentPage < pageIds.length - 1) || (dir === -1 && currentPage > 0)) {
                currentPage += dir;
                loadPage();
            }
        }

        function updateButtons() {
            document.getElementById('prevBtn').disabled = (currentPage === 0);
            document.getElementById('nextBtn').disabled = (currentPage === pageIds.length - 1);
        }

        document.getElementById('totalNum').innerText = pageIds.length;
        loadPage();
    </script>
</body>
</html>
