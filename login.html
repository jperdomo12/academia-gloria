<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Puerta Mágica | Academia de Gloria</title>
  <meta name="description" content="Acceso mágico a la Academia de Gloria Valentina." />

  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2490/2490354.png">
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2490/2490354.png">

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body{
      font-family:'Outfit',sans-serif;
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(125,211,252,.28), transparent 26%),
        radial-gradient(circle at top right, rgba(192,132,252,.25), transparent 28%),
        radial-gradient(circle at bottom right, rgba(251,191,36,.22), transparent 30%),
        linear-gradient(180deg,#f8fbff 0%,#fff7ed 55%,#f5f3ff 100%);
      color:#1e293b;
    }
    .medieval-font{font-family:'Cinzel',serif}
    .glass-card{
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(14px);
      border:2px solid rgba(219,234,254,.95);
      box-shadow:0 25px 60px rgba(79,70,229,.14);
    }
    .gradient-title{
      background:linear-gradient(90deg,#2563eb,#7c3aed,#f59e0b,#06b6d4);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }
    .float{animation:float 3s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .shake{animation:shake .35s ease}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
    .star{position:fixed;pointer-events:none;font-size:26px;animation:pop 1.4s ease forwards;z-index:50}
    @keyframes pop{0%{opacity:0;transform:translateY(20px) scale(.6)}20%{opacity:1}100%{opacity:0;transform:translateY(-100px) scale(1.25) rotate(20deg)}}
  </style>
</head>

<body class="flex items-center justify-center p-4">

  <main class="w-full max-w-5xl">
    <section class="glass-card rounded-[3rem] p-6 md:p-10 overflow-hidden relative">
      <div class="absolute -top-20 -right-20 w-64 h-64 rounded-full bg-violet-200 blur-3xl opacity-60"></div>
      <div class="absolute -bottom-20 -left-20 w-64 h-64 rounded-full bg-sky-200 blur-3xl opacity-60"></div>

      <div class="relative grid lg:grid-cols-[1fr_.9fr] gap-8 items-center">
        <div class="text-center lg:text-left">
          <div class="text-7xl mb-5 float">🏰</div>
          <p class="inline-flex items-center gap-2 bg-white border-2 border-sky-100 text-sky-700 px-4 py-2 rounded-full font-black text-sm mb-5">
            <i data-lucide="key-round" class="w-4 h-4"></i> Puerta Mágica
          </p>

          <h1 class="medieval-font text-4xl md:text-6xl font-black leading-tight mb-5">
            Academia de <span class="gradient-title">Gloria Valentina</span>
          </h1>

          <p class="text-lg md:text-xl text-slate-600 font-medium leading-relaxed max-w-2xl mx-auto lg:mx-0">
            Este es un espacio especial para aprender con calma, colores, música, juegos y mucha ilusión.
          </p>

          <div class="grid grid-cols-3 gap-3 mt-8">
            <div class="rounded-2xl bg-sky-50 border-2 border-sky-100 p-4 text-center font-black text-sky-700">📚<br>Estudiar</div>
            <div class="rounded-2xl bg-violet-50 border-2 border-violet-100 p-4 text-center font-black text-violet-700">🎮<br>Jugar</div>
            <div class="rounded-2xl bg-amber-50 border-2 border-amber-100 p-4 text-center font-black text-amber-700">✨<br>Crecer</div>
          </div>
        </div>

        <div id="loginBox" class="glass-card rounded-[2.5rem] p-6 md:p-8 relative">
          <div class="text-center mb-6">
            <div class="w-20 h-20 rounded-3xl bg-gradient-to-br from-sky-500 via-violet-500 to-amber-400 text-white flex items-center justify-center text-4xl mx-auto mb-4 shadow-lg float">
              🔑
            </div>
            <h2 class="text-3xl font-black text-slate-800 mb-2">¿Quién quiere entrar?</h2>
            <p class="text-slate-500 font-medium">Elige tu perfil y escribe la clave mágica.</p>
          </div>

          <form onsubmit="entrar(event)" class="space-y-4">
            <div>
              <label class="block font-black text-slate-700 mb-2">Perfil</label>
              <select id="profile" class="w-full rounded-2xl border-2 border-sky-100 px-5 py-4 font-bold text-slate-700 outline-none focus:border-violet-400 bg-white">
                <option value="Gloria">👧 Gloria</option>
                <option value="Invitada">🌟 Invitada</option>
              </select>
            </div>

            <div>
              <label class="block font-black text-slate-700 mb-2">Clave mágica</label>
              <input id="password" type="password" autocomplete="current-password" placeholder="Escribe la clave..."
                     class="w-full rounded-2xl border-2 border-sky-100 px-5 py-4 font-bold text-slate-700 outline-none focus:border-violet-400" />
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-sky-600 via-violet-600 to-amber-500 text-white rounded-2xl py-4 font-black text-lg shadow-lg hover:scale-[1.02] transition-all">
              Entrar a la Academia →
            </button>

            <p id="message" class="min-h-[2rem] text-center font-black"></p>
          </form>

          <!--  Bloque comentado para la primera versión (10/06/2026)
          <div class="mt-5 rounded-2xl bg-emerald-50 border-2 border-emerald-100 p-4 text-center">
            <p class="text-emerald-700 font-black">Consejo: no compartas la clave mágica fuera de casa.</p>
          </div>
          -->
          
        </div>
      </div>
    </section>
  </main>

  <script>
    lucide.createIcons();

    const ACCESS_KEYS = {
      Gloria: "gloria2026",
      Invitada: "academia"
    };

    function estrellas(){
      const icons = ["⭐","✨","🌟","🔑","🏰"];
      for(let i=0;i<12;i++){
        const s=document.createElement("div");
        s.className="star";
        s.textContent=icons[i%icons.length];
        s.style.left=(15+Math.random()*70)+"%";
        s.style.top=(55+Math.random()*20)+"%";
        s.style.animationDelay=(Math.random()*0.2)+"s";
        document.body.appendChild(s);
        setTimeout(()=>s.remove(),1500);
      }
    }

    function entrar(event){
      event.preventDefault();

      const profile = document.getElementById("profile").value;
      const password = document.getElementById("password").value.trim();
      const message = document.getElementById("message");
      const box = document.getElementById("loginBox");

      if(password === ACCESS_KEYS[profile]){
        sessionStorage.setItem("academia_gloria_auth","ok");
        sessionStorage.setItem("academia_gloria_profile",profile);

        message.className="min-h-[2rem] text-center font-black text-emerald-600";
        message.textContent = profile === "Gloria"
          ? "🎉 ¡Hola Gloria! Bienvenida a tu Academia."
          : "🎉 ¡Bienvenida, " + profile + "!";

        estrellas();

        setTimeout(()=>{ window.location.href = "index.html"; },900);
      }else{
        message.className="min-h-[2rem] text-center font-black text-red-600";
        message.textContent="🔑 Esa no es la clave mágica. Inténtalo otra vez.";
        box.classList.remove("shake");
        void box.offsetWidth;
        box.classList.add("shake");
      }
    }

    if(sessionStorage.getItem("academia_gloria_auth")==="ok"){
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
