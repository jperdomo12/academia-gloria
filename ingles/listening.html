<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2490/2490354.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2490/2490354.png">
    <title>Listening Zone - Gloria Valentina</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .audio-card {
            background: white;
            border-radius: 3rem;
            padding: 3rem;
            border: 2px solid #e0e7ff;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-3xl mx-auto">
        <header class="mb-12">
            <a href="index.html" class="inline-flex items-center text-indigo-600 font-bold hover:gap-2 transition-all">
                <i data-lucide="arrow-left" class="w-5 h-5 mr-2"></i> Volver a Inglés
            </a>
            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-800 mt-4">Listening <span class="text-indigo-600">Zone</span></h1>
            <p class="text-slate-500 text-lg mt-2">Practice your listening skills for Unit 5</p>
        </header>

        <main class="audio-card text-center">
            <div class="w-24 h-24 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-8">
                <i data-lucide="headphones" class="w-12 h-12"></i>
            </div>
            
            <h2 class="text-2xl font-extrabold text-slate-800 mb-2">Unit 5: Adventure Time</h2>
            <p class="text-slate-400 mb-10 italic">Track 01 - Main Listening</p>

            <button onclick="toggleAudio()" id="play-btn" class="w-full max-w-sm bg-indigo-600 text-white py-6 rounded-3xl font-black text-xl shadow-xl shadow-indigo-200 hover:bg-indigo-700 hover:scale-105 transition-all flex items-center justify-center gap-4 mx-auto">
                <i data-lucide="play-circle" id="play-icon" class="w-8 h-8"></i>
                <span id="play-text">PLAY AUDIO</span>
            </button>

            <div class="mt-10 w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-indigo-500 h-full w-0 transition-all duration-300"></div>
            </div>
        </main>

        <audio id="audio-player" src="audio/listening_unit5.mp3"></audio>

        <footer class="mt-12 text-center text-slate-400 font-bold uppercase tracking-widest text-xs">
            Academia de Gloria Valentina
        </footer>
    </div>

    <script>
        const audio = document.getElementById('audio-player');
        const btn = document.getElementById('play-btn');
        const btnText = document.getElementById('play-text');
        const icon = document.getElementById('play-icon');
        const progress = document.getElementById('progress-bar');

        function toggleAudio() {
            if (audio.paused) {
                audio.play().then(() => {
                    btn.classList.replace('bg-indigo-600', 'bg-red-500');
                    btnText.innerText = "PAUSE AUDIO";
                    icon.setAttribute('data-lucide', 'pause-circle');
                    lucide.createIcons();
                }).catch(error => {
                    alert("Error: No se encuentra el archivo 'audio/listening_unit5.mp3'. Por favor, verifica que el archivo esté en la carpeta 'audio' dentro de 'ingles'.");
                });
            } else {
                audio.pause();
                resetButton();
            }
        }

        function resetButton() {
            btn.classList.replace('bg-red-500', 'bg-indigo-600');
            btnText.innerText = "PLAY AUDIO";
            icon.setAttribute('data-lucide', 'play-circle');
            lucide.createIcons();
        }

        // Actualizar barra de progreso
        audio.ontimeupdate = function() {
            const percentage = (audio.currentTime / audio.duration) * 100;
            progress.style.width = percentage + "%";
        };

        audio.onended = function() {
            resetButton();
            progress.style.width = "0%";
        };

        lucide.createIcons();
    </script>
</body>
</html>
