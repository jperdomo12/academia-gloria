<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2490/2490354.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2490/2490354.png">
    <title>Listening Zone - Gloria Valentina</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .main-card { background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%); border-radius: 3rem; }
        .practice-item { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .practice-item:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        <header class="mb-10">
            <a href="index.html" class="inline-flex items-center text-indigo-600 font-bold hover:gap-2 transition-all">
                <i data-lucide="arrow-left" class="w-5 h-5 mr-2"></i> Volver a Inglés
            </a>
            <h1 class="text-4xl font-extrabold text-slate-800 mt-4">Listening <span class="text-indigo-600">Zone</span> 🎧</h1>
        </header>

        <div class="main-card p-8 md:p-12 text-white shadow-2xl mb-12">
            <div class="flex flex-col md:flex-row items-center gap-8">
                <div class="w-20 h-20 bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur-md">
                    <i data-lucide="music" class="w-10 h-10"></i>
                </div>
                <div class="flex-1 text-center md:text-left">
                    <h2 class="text-3xl font-black mb-1">Unit 5: Adventure!</h2>
                    <p class="text-indigo-100 mb-6">Main Audio Track</p>
                    
                    <button onclick="toggleAudio()" id="play-btn" class="bg-white text-indigo-600 px-10 py-4 rounded-2xl font-black text-xl shadow-lg hover:scale-105 active:scale-95 transition-all flex items-center gap-4 mx-auto md:mx-0">
                        <i data-lucide="play" id="play-icon" class="fill-current"></i>
                        <span id="play-text">PLAY AUDIO</span>
                    </button>
                </div>
            </div>
            <div class="mt-10 bg-white/20 h-2 rounded-full overflow-hidden">
                <div id="progress" class="bg-white h-full w-0 transition-all duration-300"></div>
            </div>
            <audio id="audio-player" src="audio/listening_unit5.mp3"></audio>
        </div>

        <h3 class="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2">
            <i data-lucide="plus-circle" class="text-indigo-600"></i> Prácticas Adicionales
        </h3>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <a href="https://www.liveworksheets.com/worksheet/en/english-second-language-esl/1359367" target="_blank" class="practice-item p-6 flex flex-col items-center group">
                <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center mb-4 group-hover:bg-indigo-600 group-hover:text-white transition-all">
                    <i data-lucide="headphones"></i>
                </div>
                <span class="font-bold text-slate-700">Practice A</span>
            </a>

            <a href="https://www.liveworksheets.com/worksheet/en/english-second-language-esl/670372" target="_blank" class="practice-item p-6 flex flex-col items-center group">
                <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center mb-4 group-hover:bg-indigo-600 group-hover:text-white transition-all">
                    <i data-lucide="headphones"></i>
                </div>
                <span class="font-bold text-slate-700">Practice B</span>
            </a>

            <a href="https://www.liveworksheets.com/worksheet/en/english-second-language-esl/46710" target="_blank" class="practice-item p-6 flex flex-col items-center group">
                <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center mb-4 group-hover:bg-indigo-600 group-hover:text-white transition-all">
                    <i data-lucide="headphones"></i>
                </div>
                <span class="font-bold text-slate-700">Practice C</span>
            </a>
        </div>
    </div>

    <script>
        const audio = document.getElementById('audio-player');
        const btn = document.getElementById('play-btn');
        const btnText = document.getElementById('play-text');
        const progress = document.getElementById('progress');

        function toggleAudio() {
            if (audio.paused) {
                audio.play().then(() => {
                    btnText.innerText = "PAUSA";
                    updateIcon('pause');
                }).catch(e => alert("No se encontró el archivo de audio. Revisa la carpeta 'audio'."));
            } else {
                audio.pause();
                resetUI();
            }
        }

        function resetUI() {
            btnText.innerText = "PLAY AUDIO";
            updateIcon('play');
        }

        function updateIcon(name) {
            const icon = document.getElementById('play-icon');
            icon.setAttribute('data-lucide', name);
            lucide.createIcons();
        }

        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            progress.style.width = pct + "%";
        };

        audio.onended = () => { resetUI(); progress.style.width = "0%"; };

        lucide.createIcons();
    </script>
</body>
</html>
