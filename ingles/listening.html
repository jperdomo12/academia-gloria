<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2490/2490354.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2490/2490354.png">
    <title>Listening Zone - Gloria Valentina</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .practice-card {
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            border: 2px solid #eef2ff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 1.5rem;
        }
        .practice-card:hover {
            transform: translateY(-8px);
            border-color: #6366f1;
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.1);
        }
        .icon-box {
            width: 64px;
            height: 64px;
            background-color: #eef2ff;
            color: #6366f1;
            border-radius: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        
        <nav class="mb-12">
            <a href="index.html" class="inline-flex items-center text-indigo-600 font-bold hover:gap-2 transition-all group">
                <i data-lucide="arrow-left" class="w-5 h-5 mr-2"></i> Volver a la Academia
            </a>
        </nav>

        <header class="mb-16">
            <h1 class="text-5xl font-black text-slate-800 tracking-tight">Listening <span class="text-indigo-600">Zone</span> 🎧</h1>
            <p class="text-slate-500 text-xl mt-4">Selecciona una actividad para practicar tu inglés.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <a href="https://www.liveworksheets.com/worksheet/en/english-second-language-esl/1359367" target="_blank" class="practice-card group">
                <div class="icon-box group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                    <i data-lucide="headphones" class="w-8 h-8"></i>
                </div>
                <div>
                    <h3 class="text-2xl font-extrabold text-slate-800">Practice A</h3>
                    <p class="text-slate-400 font-medium mt-1 uppercase tracking-widest text-xs">Adventure Time</p>
                </div>
                <div class="w-full bg-indigo-50 text-indigo-600 py-3 rounded-xl font-bold group-hover:bg-indigo-600 group-hover:text-white transition-all">
                    Empezar →
                </div>
            </a>

            <a href="https://www.liveworksheets.com/worksheet/en/english-second-language-esl/670372" target="_blank" class="practice-card group">
                <div class="icon-box group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                    <i data-lucide="headphones" class="w-8 h-8"></i>
                </div>
                <div>
                    <h3 class="text-2xl font-extrabold text-slate-800">Practice B</h3>
                    <p class="text-slate-400 font-medium mt-1 uppercase tracking-widest text-xs">Vocabulary Check</p>
                </div>
                <div class="w-full bg-indigo-50 text-indigo-600 py-3 rounded-xl font-bold group-hover:bg-indigo-600 group-hover:text-white transition-all">
                    Empezar →
                </div>
            </a>

            <a href="https://www.liveworksheets.com/worksheet/en/english-second-language-esl/46710" target="_blank" class="practice-card group">
                <div class="icon-box group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                    <i data-lucide="headphones" class="w-8 h-8"></i>
                </div>
                <div>
                    <h3 class="text-2xl font-extrabold text-slate-800">Practice C</h3>
                    <p class="text-slate-400 font-medium mt-1 uppercase tracking-widest text-xs">Listening Quiz</p>
                </div>
                <div class="w-full bg-indigo-50 text-indigo-600 py-3 rounded-xl font-bold group-hover:bg-indigo-600 group-hover:text-white transition-all">
                    Empezar →
                </div>
            </a>

        </div>

        <footer class="mt-24 text-center">
            <p class="text-slate-300 font-bold uppercase tracking-[0.2em] text-[10px]">Academia Gloria Valentina • 2024</p>
        </footer>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
