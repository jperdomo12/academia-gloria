<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening Challenge - Gloria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-rose-50 p-6 md:p-12 font-sans">
    <div class="max-w-4xl mx-auto text-center">
        <a href="index.html" class="text-rose-700 font-bold mb-8 inline-block">← Back to Menu</a>
        
        <h1 class="text-4xl font-black text-slate-800 mb-12">🎧 Listening Zone</h1>

        <div class="bg-white p-10 rounded-[3rem] shadow-lg mb-8 border-b-8 border-rose-200">
            <h2 class="text-2xl font-bold text-rose-600 mb-6">Audio 1: The Magic Backpack</h2>
            <button onclick="speak('In my backpack, I have a big red pencil, a yellow notebook and a green apple. I am ready for school!')" 
                    class="bg-rose-500 text-white px-10 py-5 rounded-3xl font-black flex items-center gap-4 mx-auto hover:scale-105 transition-all">
                <i data-lucide="play-circle" class="w-8 h-8"></i> Listen to Audio
            </button>
            
            <div class="mt-12 space-y-8 text-left max-w-md mx-auto">
                <p class="font-bold text-slate-800 text-xl">What color is the apple?</p>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="alert('❌ Try again!')" class="p-4 border-2 rounded-2xl font-bold hover:bg-slate-50">Red</button>
                    <button onclick="alert('✅ Correct! It is green!')" class="p-4 border-2 rounded-2xl font-bold hover:bg-slate-50">Green</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        function speak(text) {
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'en-GB';
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
