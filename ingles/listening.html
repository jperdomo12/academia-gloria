<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2490/2490354.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2490/2490354.png">
    <title>Listening Zone - Gloria Valentina</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .audio-card { background: white; border-radius: 2.5rem; padding: 2rem; border: 1px solid #e2e8f0; transition: all 0.3s; }
        .audio-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
        .btn-play { background-color: #4f46e5; color: white; transition: all 0.2s; }
        .btn-play:hover { background-color: #4338ca; transform: scale(1.05); }
        .btn-play.playing { background-color: #ef4444; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        <header class="mb-12">
            <a href="index.html" class="inline-flex items-center text-indigo-600 font-bold hover:gap-2 transition-all mb-4">
                <i data-lucide="arrow-left" class="w-5 h-5 mr-2"></i> Volver a Inglés
            </a>
            <h1 class="text-4xl font-extrabold text-slate-800">Listening <span class="text-indigo-600">Zone</span> 🎧</h1>
            <p class="text-slate-500 mt-2 text-lg">Escucha y practica los audios de la Unidad 5.</p>
        </header>

        <section class="bg-indigo-600 rounded-[3rem] p-8 md:p-12 text-white mb-12 shadow-xl shadow-indigo-100">
            <div class="flex flex-col md:flex-row items-center gap-8">
                <div class="w-24 h-24 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm">
                    <i data-lucide="music" class="w-12 h-12 text-white"></i>
                </div>
                <div class="flex-1 text-center md:text-left">
                    <h2 class="text-3xl font-black mb-2">Main Listening: Unit 5</h2>
                    <p class="text-indigo-100 text-lg mb-6">Adventure Time - Track 01</p>
                    
                    <button onclick="toggleMainAudio()" id="main-play-btn" class="bg-white text-indigo-600 px-10 py-4 rounded-2xl font-black text-xl flex items-center gap-4 hover:bg-indigo-50 transition-all mx-auto md:mx-0">
                        <i data-lucide="play" id="main-icon"></i>
                        <span id="main-text">PLAY AUDIO</span>
                    </button>
                </div>
            </div>
            <div class="mt-8 bg-white/20 h-2 rounded-full overflow-hidden">
                <div id="main-progress" class="bg-white h-full w-0 transition-all duration-300"></div>
            </div>
            <audio id="main-audio" src="audio/listening_unit5.mp3"></audio>
        </section>

        <h3 class="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2">
            <i data-lucide="list-music" class="text-indigo-600"></i> Otros Ejercicios de Listening
        </h3>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="audio-card flex items-center gap-4">
                <div class="bg-purple-100 p-4 rounded-2xl text-purple-600">
                    <i data-lucide="headphones"></i>
                </div>
                <div class="flex-1">
                    <h4 class="font-bold text-slate-800">Listening Practice A</h4>
                    <a href="https://www.liveworksheets.com/worksheet/en/english-second-language-esl/1359367" target="_blank" class="text-sm text-indigo-600 font-bold hover:underline">Abrir Ficha Interactiva →</a>
                </div>
            </div>

            <div class="audio-card flex items-center gap-4">
                <div class="bg-purple-100 p-4 rounded-2xl text-purple-600">
                    <i data-lucide="headphones"></i>
                </div>
                <div class="flex-1">
                    <h4 class="font-bold text-slate-800">Listening Practice B</h4>
                    <a href="https://www.liveworksheets.com/worksheet/en/english-second-language-esl/670372" target="_blank" class="text-sm text-indigo-600 font-bold hover:underline">Abrir Ficha Interactiva →</a>
                </div>
            </div>
        </div>

        <footer class="mt-20 text-center text-slate-400 font-bold uppercase tracking-widest text-xs">
            Academia de Gloria Valentina
        </footer>
    </div>

    <script>
        const mainAudio = document.getElementById('main-audio');
        const mainBtn = document.getElementById('main-play-btn');
        const mainText = document.getElementById('main-text');
        const mainProgress = document.getElementById('main-progress');

        function toggleMainAudio() {
            if (mainAudio.paused) {
                mainAudio.play().then(() => {
                    mainBtn.classList.add('playing');
                    mainText.innerText = "PAUSE";
                    updateMainIcon('pause');
                }).catch(e => {
                    alert("No se encuentra el audio en: audio/listening_unit5.mp3");
                });
            } else {
                mainAudio.pause();
                resetMainBtn();
            }
        }

        function resetMainBtn() {
            mainBtn.classList.remove('playing');
            mainText.innerText = "PLAY AUDIO";
            updateMainIcon('play');
        }

        function updateMainIcon(name) {
            const icon = document.getElementById('main-icon');
            icon.setAttribute('data-lucide', name);
            lucide.createIcons();
        }

        mainAudio.ontimeupdate = () => {
            const pct = (mainAudio.currentTime / mainAudio.duration) * 100;
            mainProgress.style.width = pct + "%";
        };

        mainAudio.onended = () => {
            resetMainBtn();
            mainProgress.style.width = "0%";
        };

        lucide.createIcons();
    </script>
</body>
</html>
