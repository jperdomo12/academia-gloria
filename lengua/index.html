<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Academia de Gloria | Lengua</title>

  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2490/2490354.png">
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2490/2490354.png">

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      font-family:'Outfit',sans-serif;
      background:
        radial-gradient(circle at top left, rgba(251,191,36,.12), transparent 22%),
        radial-gradient(circle at bottom right, rgba(59,130,246,.10), transparent 24%),
        linear-gradient(180deg,#f6f3ee 0%,#f7f5f0 100%);
      color:#1f2937;
    }

    .dotted-bg{
      background-image: radial-gradient(rgba(251,191,36,.22) 1px, transparent 1px);
      background-size: 18px 18px;
    }

    .hero-card{
      background: linear-gradient(90deg, #f97316 0%, #f59e0b 100%);
      border: 6px solid rgba(255,255,255,.95);
      box-shadow: 0 18px 35px rgba(245, 158, 11, .20);
    }

    .topic-card{
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(251,191,36,.28);
      transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
      min-height: 430px;
    }

    .topic-card:hover{
      transform: translateY(-6px);
      box-shadow: 0 24px 40px rgba(30, 41, 59, .10);
    }

    .cta-arrow{ transition: transform .2s ease; }
    .topic-card:hover .cta-arrow{ transform: translateX(4px); }

    .ghost-card{
      background: rgba(255,255,255,.3);
      border: 3px dashed rgba(251,191,36,.30);
      min-height: 430px;
    }
  </style>
</head>

<body class="dotted-bg">

<main class="max-w-[1800px] mx-auto px-4 py-6 md:px-8 md:py-8">

  <!-- BOTÓN VOLVER -->
  <div class="mb-6">
    <a href="../index.html"
       class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-white shadow-sm border border-slate-200 hover:border-sky-300 hover:text-sky-600 transition-all font-bold">
      ← Volver a la Academia
    </a>
  </div>

  <!-- HEADER -->
  <header class="hero-card rounded-[3rem] px-6 py-8 md:px-9 md:py-9 mb-10">
    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-6">

      <div>
        <h1 class="text-3xl md:text-5xl font-black text-white">
          Gaudem - Área Lengua
        </h1>
        <p class="text-white/90 text-xl font-semibold mt-2">
          Portal oficial del colegio
        </p>
      </div>

      <a href="https://sites.google.com/gaudem.es/quinto/%C3%A1reas/lengua"
         target="_blank"
         class="inline-flex items-center gap-3 bg-amber-300 text-white text-xl font-black px-6 py-3 rounded-2xl shadow-md">
        Abrir Sitio ↗
      </a>

    </div>
  </header>

  <!-- TARJETAS -->
  <section class="grid md:grid-cols-2 xl:grid-cols-3 gap-8">

    <!-- Gramática -->
    <a href="gramatica.html"
       class="topic-card rounded-[2rem] p-8 block">

      <div class="text-4xl mb-6">✍️</div>

      <h2 class="text-3xl font-semibold mb-4">Gramática</h2>

      <p class="text-slate-600 mb-8">
        Aprende a distinguir sustantivos, verbos, adjetivos y determinantes.
      </p>

      <div class="text-orange-600 font-bold">
        Iniciar lección →
      </div>

    </a>

    <!-- Diálogo -->
    <a href="dialogo.html"
       class="topic-card rounded-[2rem] p-8 block">

      <div class="text-4xl mb-6">💬</div>

      <h2 class="text-3xl font-semibold mb-4">El Diálogo</h2>

      <p class="text-slate-600 mb-8">
        Estilo directo e indirecto y tipos de conversación.
      </p>

      <div class="text-sky-600 font-bold">
        Estudiar →
      </div>

    </a>

    <!-- Próximos -->
    <div class="ghost-card rounded-[2rem] p-8 flex flex-col items-center justify-center text-center">
      <div class="text-4xl mb-4">📖</div>
      <p class="text-xl font-bold text-amber-400">
        Próximos temas
      </p>
    </div>

  </section>

</main>

</body>
</html>
