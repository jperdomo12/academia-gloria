<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matezonas Gloria - Validación Real</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8fafc;
        }

        .card-shadow {
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            transition: all 0.3s ease;
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .exercise-number {
            color: white;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 1rem;
        }
    </style>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2490/2490354.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2490/2490354.png">
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 bg-white px-6 py-3 rounded-full shadow-sm text-indigo-600 font-bold hover:bg-indigo-50 transition-all border border-indigo-100">
                <span>←</span> Volver al Menú Mates
            </a>
        </div>

        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-slate-800 mb-2">Matezonas de Gloria</h1>
            <p class="text-slate-500 text-lg">¡Resuelve los 15 retos! Los ejercicios se mezclan al recargar.</p>
            <div class="mt-4 flex justify-center gap-6 text-sm font-medium">
                <span class="flex items-center gap-2"><span class="w-3 h-3 bg-indigo-500 rounded-full"></span> Lógica Estándar</span>
                <span class="flex items-center gap-2"><span class="w-3 h-3 bg-pink-500 rounded-full"></span> Retos de Gloria</span>
            </div>
        </header>

        <div id="exercise-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>

        <div id="stats" class="mt-12 p-6 bg-white rounded-2xl shadow-sm border border-slate-200 text-center">
            <p class="text-slate-600 font-semibold text-xl">Progreso: <span id="solved-count" class="text-indigo-600 font-bold">0</span> de 15 completados</p>
        </div>
    </div>

    <script>
        const exercises = [
            { id: 1, type: 'original', ans: 117, text: 'En la biblioteca hay <span class="font-bold text-indigo-600">105 libros</span> de aventuras y <span class="font-bold text-indigo-600">44 de misterio</span>. Si se han prestado <span class="font-bold text-indigo-600">32</span>, ¿cuántos quedan?', placeholder: 'Libros' },
            { id: 2, type: 'original', ans: 20, text: 'Una profesora compra <span class="font-bold text-indigo-600">4 bolsas</span> de caramelos de <span class="font-bold text-indigo-600">30 unidades</span>. Para repartirlos entre <span class="font-bold text-indigo-600">6 alumnos</span>, ¿cuántos recibe cada uno?', placeholder: 'Caramelos' },
            { id: 3, type: 'original', ans: 25, text: 'Marta tiene <span class="font-bold text-indigo-600">35€</span> ahorrados. Su abuelo le regala <span class="font-bold text-indigo-600">20€</span>. Si quiere un juego de <span class="font-bold text-indigo-600">80€</span>, ¿cuánto le falta?', placeholder: '€' },
            { id: 4, type: 'original', ans: 78, text: 'En el huerto hay <span class="font-bold text-indigo-600">6 filas</span> de lechugas con <span class="font-bold text-indigo-600">15</span> en cada una. Si se han estropeado <span class="font-bold text-indigo-600">12</span>, ¿cuántas quedan?', placeholder: 'Lechugas' },
            { id: 5, type: 'original', ans: 30, text: 'Para una excursión hay <span class="font-bold text-indigo-600">150 alumnos</span>. Hay dos autobuses de <span class="font-bold text-indigo-600">60 plazas</span>. ¿Cuántos irán en el tercer autobús?', placeholder: 'Alumnos' },
            { id: 6, type: 'original', ans: 75, text: 'Un frutero tiene <span class="font-bold text-indigo-600">12 cajas</span> con <span class="font-bold text-indigo-600">10 manzanas</span>. Si vende <span class="font-bold text-indigo-600">45 manzanas</span>, ¿cuántas le quedan?', placeholder: 'Manzanas' },
            { id: 7, type: 'original', ans: 170, text: 'Juan tenía <span class="font-bold text-indigo-600">180 cromos</span>. Perdió <span class="font-bold text-indigo-600">25</span> y luego su amiga le regaló <span class="font-bold text-indigo-600">15</span>. ¿Cuántos tiene ahora?', placeholder: 'Cromos' },
            { id: 8, type: 'original', ans: 20, text: 'Tres hermanos compran un regalo de <span class="font-bold text-indigo-600">90€</span>. Si sus padres les dan <span class="font-bold text-indigo-600">30€</span>, ¿cuánto pone cada hermano?', placeholder: '€' },
            { id: 9, type: 'new', ans: 55, text: 'Un cine tiene <span class="font-bold text-pink-600">10 filas</span> con <span class="font-bold text-pink-600">20 asientos</span>. Si hay <span class="font-bold text-pink-600">145 personas</span>, ¿cuántos asientos libres quedan?', placeholder: 'Asientos' },
            { id: 10, type: 'new', ans: 12, text: 'Gloria ha horneado <span class="font-bold text-pink-600">48 galletas</span>. Quiere ponerlas en <span class="font-bold text-pink-600">4 cajas</span> iguales. ¿Cuántas galletas por caja?', placeholder: 'Galletas' },
            { id: 11, type: 'new', ans: 285, text: 'Había <span class="font-bold text-pink-600">250 peces</span>. Nacieron <span class="font-bold text-pink-600">75</span> y se llevaron <span class="font-bold text-pink-600">40</span>. ¿Cuántos peces quedan en el estanque?', placeholder: 'Peces' },
            { id: 12, type: 'new', ans: 200, text: 'Un camión lleva <span class="font-bold text-pink-600">8 estanterías</span>. Si cada una tiene capacidad para <span class="font-bold text-pink-600">25 libros</span>, ¿cuántos libros lleva?', placeholder: 'Libros' },
            { id: 13, type: 'new', ans: 10, text: 'Tienes <span class="font-bold text-pink-600">100 caramelos</span>. Te quedas <span class="font-bold text-pink-600">10</span> y el resto para <span class="font-bold text-pink-600">9 amigos</span>. ¿Cuántos das a cada uno?', placeholder: 'Caramelos' },
            { id: 14, type: 'new', ans: 31, text: 'Gloria compra un estuche de <span class="font-bold text-pink-600">15€</span> y un cuaderno de <span class="font-bold text-pink-600">4€</span>. Paga con <span class="font-bold text-pink-600">50€</span>, ¿devolución?', placeholder: '€' },
            { id: 15, type: 'new', ans: 7, text: 'Gloria quiere un juguete de <span class="font-bold text-pink-600">22€</span>. Tiene <span class="font-bold text-pink-600">10€</span> y su madre le da <span class="font-bold text-pink-600">5€</span>. ¿Cuánto le falta?', placeholder: '€' }
        ];

        let solved = 0;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function render() {
            const container = document.getElementById('exercise-grid');
            shuffle([...exercises]).forEach(ex => {
                const color = ex.type === 'new' ? 'pink' : 'indigo';
                const card = document.createElement('div');
                card.className = `bg-white p-6 rounded-xl card-shadow border-l-4 border-${color}-500 flex flex-col justify-between`;
                card.innerHTML = `
                    <div>
                        <div class="exercise-number bg-${color}-500 text-xs">${ex.id}</div>
                        <p class="text-slate-700 text-lg leading-snug">${ex.text}</p>
                    </div>
                    <div class="mt-6 flex gap-2">
                        <input type="number" data-ans="${ex.ans}" placeholder="${ex.placeholder}" 
                               class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-${color}-400 outline-none font-bold text-slate-700">
                        <button onclick="validate(this, ${color === 'pink' ? "'#ec4899'" : "'#6366f1'"})" 
                                class="px-4 py-2 bg-${color}-500 text-white rounded-lg font-bold hover:opacity-90 transition-all">OK</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function validate(btn, color) {
            const input = btn.previousElementSibling;
            const userAns = parseInt(input.value);
            const correctAns = parseInt(input.dataset.ans);
            const card = btn.closest('div.card-shadow');

            if (userAns === correctAns) {
                input.disabled = true;
                btn.disabled = true;
                btn.innerHTML = "✓";
                btn.style.backgroundColor = "#10b981";
                input.className = "w-full border-2 border-green-500 bg-green-50 rounded-lg px-3 py-2 font-bold text-green-700";
                
                solved++;
                document.getElementById('solved-count').innerText = solved;
            } else {
                card.classList.add('shake');
                input.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
                setTimeout(() => {
                    card.classList.remove('shake');
                }, 400);
            }
        }

        window.onload = render;
    </script>
</body>
</html>
